<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rotate Align</title>
  <style>
    :root{
      --bg1:#1a1a1a;
      --bg2:#2a2a2a;
      --panel:#121212;
      --text:#e9e9e9;
      --muted:#bdbdbd;
      --accent:#d7c08a;
      --danger:#d46a6a;
      --gap:4px;
      --tile:92px;
      --cols:3;
      --rows:3;
      --radius:0px;
      --shadow: 0 12px 32px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100svh;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(900px 600px at 80% 30%, rgba(215,192,138,.08), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .shell{
      width:min(920px, 100%);
      display:grid;
      grid-template-columns: 1fr;
      gap:22px;
      align-items:start;
    }

    @media (max-width: 860px){
      .shell{ grid-template-columns: 1fr; }
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),
        linear-gradient(180deg, #161616, #0f0f0f);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
      position:relative;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 18px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .title{
      display:flex;
      gap:12px;
      align-items:center;
      font-weight:800;
      letter-spacing:.3px;
      font-size:20px;
    }

    .subtitle{
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
      letter-spacing:.2px;
    }

    .titleBlock{ display:flex; flex-direction:column; }

    .spider{
      width:26px;
      height:26px;
      flex:0 0 auto;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.5));
    }

    #bullIcon{
      cursor: pointer;
    }

    #bullIcon:focus-visible{
      outline: 2px solid rgba(255,255,255,.55);
      outline-offset: 3px;
      border-radius: 6px;
    }

    .content{ padding:18px; }

    .boardWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px 18px 28px;
    }

    .board{
      display:grid;
      grid-template-columns: repeat(var(--cols), var(--tile));
      grid-template-rows: repeat(var(--rows), var(--tile));
      gap: var(--gap);
      background:
        radial-gradient(120px 80px at 25% 20%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(140px 120px at 70% 60%, rgba(0,0,0,.35), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.10);
      padding: var(--gap);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      position:relative;
      user-select:none;
    }

    .board.solved{
      gap: 0;
      padding: 0;
    }

    .tile{
      width: var(--tile);
      height: var(--tile);
      border-radius: 0;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        radial-gradient(120px 120px at 30% 25%, rgba(215,192,138,.18), rgba(0,0,0,.0) 55%),
        linear-gradient(180deg, #2b2b2b, #161616);
      color: rgba(255,255,255,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      letter-spacing:.3px;
      font-size:18px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,.35);
      transform: translateZ(0);
      position:relative;
      overflow:hidden;
    }

    .board.solved .tile{
      border: 0;
      box-shadow: none;
    }

    .tile:active{ cursor: pointer; }

    .tile::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(160px 120px at 25% 20%, rgba(255,255,255,.14), transparent 55%),
        radial-gradient(180px 160px at 70% 80%, rgba(0,0,0,.35), transparent 60%);
      opacity:.75;
      pointer-events:none;
    }

    .tile .glyph{ position:relative; z-index:1; width: 100%; height: 100%; transform-origin: 50% 50%; transition: transform 120ms ease; }

    .tile.correct{
      outline: 2px solid rgba(120,210,140,.70);
      outline-offset:-2px;
      box-shadow: 0 14px 26px rgba(55,190,95,.12), 0 12px 24px rgba(0,0,0,.40);
    }

    .tile.wrongCorner{
      outline: 2px solid rgba(212,106,106,.70);
      outline-offset:-2px;
    }

    .tile.dragging{
      opacity:.85;
      transform: scale(1.02);
    }

    button{
      appearance:none;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      color:var(--text);
      padding:10px 12px;
      border-radius: 0;
      font-weight:700;
      letter-spacing:.2px;
      cursor:pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }

    button:hover{ border-color: rgba(215,192,138,.55); }
    button:active{ transform: translateY(1px); }

    .btnPrimary{
      border-color: rgba(215,192,138,.55);
      background: linear-gradient(180deg, rgba(215,192,138,.22), rgba(215,192,138,.08));
    }

    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(
          closest-side,
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0)
        );
      z-index: 40;
    }

    .flash.show {
      animation: flash 520ms ease-out;
    }

    @keyframes flash {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    .boardWrap.victory {
      animation: victory 1400ms ease-in-out;
    }

    @keyframes victory {
      0% { transform: scale(1); filter: brightness(1); }
      35% { transform: scale(1.02); filter: brightness(1.08); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .keyDrop {
      position: absolute;
      left: 50%;
      top: 10px;
      --key-size: calc(var(--tile) * var(--cols));
      --key-land: calc(var(--tile) * var(--rows) * 0.58);
      --key-final: calc(var(--key-land) * 0.955);
      width: var(--key-size);
      height: var(--key-size);
      z-index: 50;
      transform: translate(-50%, calc(-1 * var(--key-size)));
      opacity: 0;
      pointer-events: none;
      filter:
        drop-shadow(0 10px 10px rgba(0, 0, 0, 0.55))
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.06));
    }

    .keyDrop.show {
      opacity: 1;
      animation: keyFall 1100ms cubic-bezier(0.22, 0.9, 0.2, 1) forwards;
      transform: translate(-50%, var(--key-final)) rotate(0deg);
    }

    @keyframes keyFall {
      0% { transform: translate(-50%, calc(-1 * var(--key-size))) rotate(-18deg); }
      65% { transform: translate(-50%, var(--key-final)) rotate(8deg); }
      74% { transform: translate(-50%, calc(var(--key-final) * 0.72)) rotate(-6deg); }
      80% { transform: translate(-50%, var(--key-final)) rotate(3deg); }
      86% { transform: translate(-50%, calc(var(--key-final) * 0.83)) rotate(-3deg); }
      91% { transform: translate(-50%, var(--key-final)) rotate(2deg); }
      95% { transform: translate(-50%, calc(var(--key-final) * 0.93)) rotate(-1deg); }
      100% { transform: translate(-50%, var(--key-final)) rotate(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .flash.show,
      .boardWrap.victory {
        animation: none;
      }

      .keyDrop.show {
        animation: none;
        opacity: 1;
        transform: translate(-50%, var(--key-final));
      }
    }

  </style>
</head>

        <div id="board" class="board" role="grid" aria-label="Rotate align puzzle board"></div>

  </div>

  <script>
    const ROWS = 3;
    const COLS = 3;
    const SIZE = ROWS * COLS;

    const boardEl = document.getElementById('board');
    const boardWrapEl = document.getElementById('boardWrap');
    const flashEl = document.getElementById('flash');
    const keyDropEl = document.getElementById('keyDrop');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const bullIconEl = document.getElementById('bullIcon');

    let rotations = solvedState();
    let justWon = false;

    const FIXED_ROW = Math.floor(ROWS / 2);
    const CENTER_COL = Math.floor(COLS / 2);
    const RIGHT_OF_CENTER_COL = Math.min(COLS - 1, CENTER_COL + 1);
    const CENTER_INDEX = FIXED_ROW * COLS + CENTER_COL;
    const CENTER_RIGHT_INDEX = FIXED_ROW * COLS + RIGHT_OF_CENTER_COL;

    let centerRightLocked = false;

    function isFixed(i){
      return i === CENTER_INDEX || (centerRightLocked && i === CENTER_RIGHT_INDEX);
    }

    function solvedState(){
      return Array.from({ length: SIZE }, () => 0);
    }

    function shuffleState(){
      const a = solvedState();

      function rotateAtLocal(i){
        if (isFixed(i)) return;
        a[i] = (a[i] + 1) % 4;
      }

      function applyMoveLocal(i){
        if (isFixed(i)) return;
        const [r, c] = idxToRC(i);
        const targets = [
          [r, c],
          [r - 1, c],
          [r + 1, c],
          [r, c - 1],
          [r, c + 1],
        ];
        for (const [rr, cc] of targets){
          if (!inBounds(rr, cc)) continue;
          const idx = rcToIdx(rr, cc);
          if (isFixed(idx)) continue;
          rotateAtLocal(idx);
        }
      }

      const steps = Math.max(25, SIZE * 10);
      for (let s = 0; s < steps; s++){
        applyMoveLocal(Math.floor(Math.random() * SIZE));
      }

      // avoid starting solved
      if (a.every(r => r === 0)){
        applyMoveLocal(Math.floor(Math.random() * SIZE));
      }

      return a;
    }

    function idxToRC(i){
      return [Math.floor(i / COLS), i % COLS];
    }

    function rcToIdx(r, c){
      return r * COLS + c;
    }

    function inBounds(r, c){
      return r >= 0 && r < ROWS && c >= 0 && c < COLS;
    }

    function rotateAt(i){
      if (isFixed(i)) return;
      rotations[i] = (rotations[i] + 1) % 4;
    }

    function applyMove(i){
      if (isFixed(i)) return;
      const [r, c] = idxToRC(i);
      const targets = [
        [r, c],
        [r - 1, c],
        [r + 1, c],
        [r, c - 1],
        [r, c + 1],
      ];
      for (const [rr, cc] of targets){
        if (!inBounds(rr, cc)) continue;
        const idx = rcToIdx(rr, cc);
        if (isFixed(idx)) continue;
        rotateAt(idx);
      }
    }

    function isSolved(){
      return rotations.every(r => r === 0);
    }

    const SOURCE_IMAGE_URL = 'https://p7.hiclipart.com/preview/104/425/263/taurus-astrological-sign-bull-clip-art-taurus.jpg';

    function applyTileImage(glyphEl, index){
      const r = Math.floor(index / COLS);
      const c = index % COLS;

      // Crop the one big image into a COLS x ROWS grid.
      glyphEl.style.backgroundImage = `url(${SOURCE_IMAGE_URL})`;
      glyphEl.style.backgroundRepeat = 'no-repeat';
      glyphEl.style.backgroundSize = `${COLS * 100}% ${ROWS * 100}%`;
      glyphEl.style.backgroundPosition = `${(c * 100) / (COLS - 1)}% ${(r * 100) / (ROWS - 1)}%`;
      glyphEl.style.imageRendering = 'auto';
      glyphEl.style.border = '0';
    }

    function render(){
      boardEl.innerHTML = '';
      boardEl.style.setProperty('--cols', String(COLS));
      boardEl.style.setProperty('--rows', String(ROWS));
      boardWrapEl.style.setProperty('--cols', String(COLS));
      boardWrapEl.style.setProperty('--rows', String(ROWS));
      boardEl.classList.toggle('solved', isSolved());

      for (let i = 0; i < rotations.length; i++){
        const rot = rotations[i];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.setAttribute('role', 'gridcell');
        if (isFixed(i)) tile.setAttribute('tabindex', '-1');
        else tile.setAttribute('tabindex', '0');
        tile.dataset.index = String(i);

        const glyph = document.createElement('div');
        glyph.className = 'glyph';
        applyTileImage(glyph, i);
        glyph.style.transform = `rotate(${rot * 90}deg)`;
        tile.appendChild(glyph);

        if (rot === 0) tile.classList.add('correct');

        if (isFixed(i)){
          tile.style.cursor = 'default';
        }

        tile.addEventListener('click', () => {
          if (isFixed(i)) return;
          applyMove(i);
          justWon = false;
          render();
        });

        tile.addEventListener('keydown', (e) => {
          if (isFixed(i)) return;
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            tile.click();
          }
        });

        boardEl.appendChild(tile);
      }

      renderStatus();
    }

    function renderStatus(){
      if (isSolved()){
        if (!justWon){
          justWon = true;
          boardWrapEl.classList.add('victory');
          flashEl.classList.remove('show');
          void flashEl.offsetWidth;
          flashEl.classList.add('show');
          keyDropEl.classList.remove('show');
          void keyDropEl.offsetWidth;
          keyDropEl.classList.add('show');
          setTimeout(() => boardWrapEl.classList.remove('victory'), 1500);
        }
      }
    }

    function reset(){
      rotations = solvedState();
      centerRightLocked = false;
      justWon = false;
      boardWrapEl.classList.remove('victory');
      keyDropEl.classList.remove('show');
      render();
    }

    function shuffle(){
      rotations = shuffleState();
      justWon = false;
      boardWrapEl.classList.remove('victory');
      keyDropEl.classList.remove('show');
      render();
    }

    function toggleCenterRightLock(){
      if (centerRightLocked) return;

      // Rotate the center-right tile into the correct orientation using real moves
      // (so neighbors rotate too), then lock it.
      for (let k = 0; k < 4 && rotations[CENTER_RIGHT_INDEX] !== 0; k++){
        applyMove(CENTER_RIGHT_INDEX);
      }
      justWon = false;
      centerRightLocked = true;
      render();
    }

    shuffleBtn.addEventListener('click', shuffle);
    bullIconEl.addEventListener('click', toggleCenterRightLock);
    bullIconEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleCenterRightLock();
      }
    });
    // Start shuffled
    shuffle();
  </script>
